<!DOCTYPE html>

  <meta charset="UTF-8"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@600;700&display=swap"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{color-scheme:light;background:#f4f3f0;margin:0;padding:0;overflow-x:hidden;max-width:100vw;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
    input,select,textarea,button{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color-scheme:light}
    input[type="date"]::-webkit-calendar-picker-indicator,input[type="month"]::-webkit-calendar-picker-indicator{filter:opacity(0.5)}
    select option{background:#faf9f7;color:#2c2a27}
    .phi{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 1rem;max-width:960px;margin:0 auto}
    .pnav{display:flex;gap:.15rem}
    .pact{display:flex;gap:.4rem;align-items:center}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:.75rem}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    .gf{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.75rem}
    .gfi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.65rem}
    .pbn{display:none;position:fixed;bottom:0;left:0;right:0;background:#faf9f7;border-top:1px solid #e0ddd8;z-index:200;padding:.4rem 0 calc(.4rem + env(safe-area-inset-bottom))}
    .pbni{display:flex;justify-content:space-around}
    .pbb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:.3rem .5rem;border-radius:.5rem;font-size:.65rem;font-weight:600;color:#a09c97;font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-width:56px}
    .pbb.active{color:#7c6f5e}
    .pbb .ic{font-size:1.2rem;line-height:1}
    .pmb{background:#faf9f7;border-radius:1rem;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(44,42,39,.18);overflow:hidden;border:1px solid #e0ddd8}
    @keyframes spin{to{transform:rotate(360deg)}}
    .perricas-layout{display:flex;gap:1.25rem;max-width:1160px;margin:0 auto;padding:1.5rem 1rem}
    .perricas-sidebar{width:190px;flex-shrink:0;position:sticky;top:70px;align-self:flex-start}
    .perricas-content{flex:1;min-width:0}
    @media(max-width:760px){.perricas-sidebar{display:none}.perricas-layout{padding:1rem}}
    @media(max-width:600px){
      .pnav{display:none}.pbn{display:block}
      .g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}
      .gfi{grid-template-columns:1fr 1fr}
      main{padding-bottom:80px!important}
      .pmb{max-width:100%!important;margin:.5rem!important;border-radius:.75rem!important}
    }
  </style>
</head>

const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbmJ4dGR3cnZrendxcnRhc2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTc3MzcsImV4cCI6MjA5NzQ5MzczN30.8m2Ov1_XnL5-eui1qZiIU78QsTZEa5oDZzvqDhrjtV8";
const sbc = supabase.createClient(SB_URL, SB_KEY);

// Wrapper para operaciones de datos — usa el cliente SDK que gestiona tokens automáticamente
const sb = {
  async get(t, f={}) {
    let q = sbc.from(t).select("*");
    for (const [k,v] of Object.entries(f)) q = q.eq(k, v);
    const {data, error} = await q;
    if (error) throw new Error(error.message);
    return data;
  },
  async upsert(t, rows) {
    const {error} = await sbc.from(t).upsert(Array.isArray(rows)?rows:[rows], {onConflict:"id"});
    if (error) throw new Error(error.message);
  },
  async del(t, id) {
    const {error} = await sbc.from(t).delete().eq("id", id);
    if (error) throw new Error(error.message);
  },
  async patch(t, id, data) {
    const {error} = await sbc.from(t).update(data).eq("id", id);
    if (error) throw new Error(error.message);
  }
};

// ── Config ────────────────────────────────────────────────────────────────────
const C={bg:"#f4f3f0",sf:"#faf9f7",sa:"#eeecea",bd:"#e0ddd8",bf:"#b0a99f",tx:"#2c2a27",tm:"#6b6760",ts:"#a09c97",gn:"#3a8c6e",gb:"#e8f4ef",rd:"#b85c4a",rb:"#f5eae7",bl:"#4a7ab5",bb:"#eaf0f8",ac:"#7c6f5e",ab:"#f0ece6"};
const PAL=["#7c6f5e","#4a7ab5","#3a8c6e","#b85c4a","#8a6eb0","#b08a3a","#4a8a8a","#8a7a4a"];
const fmt=n=>new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n??0);
const fmtD=d=>new Date(d+"T00:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});
const tod=()=>new Date().toISOString().split("T")[0];
const uid=()=>Math.random().toString(36).slice(2,10);

const TIPOS=[{v:"efectivo",l:"Efectivo"},{v:"corriente",l:"Cuenta corriente"},{v:"ahorro",l:"Cuenta de ahorro"},{v:"deposito",l:"Depósito"},{v:"inversion",l:"Fondo de inversión"},{v:"credito",l:"Tarjeta de crédito"},{v:"otro",l:"Otro"}];

const CATS=[
  {id:"c1",nombre:"Supermercado",tipo:"gasto",icono:"🛒"},{id:"c2",nombre:"Restaurantes",tipo:"gasto",icono:"🍽️"},
  {id:"c3",nombre:"Cafés y bares",tipo:"gasto",icono:"☕"},{id:"c4",nombre:"Transporte público",tipo:"gasto",icono:"🚌"},
  {id:"c5",nombre:"Combustible",tipo:"gasto",icono:"⛽"},{id:"c6",nombre:"Parking y peajes",tipo:"gasto",icono:"🅿️"},
  {id:"c7",nombre:"Alquiler / Hipoteca",tipo:"gasto",icono:"🏠"},{id:"c8",nombre:"Comunidad y gastos",tipo:"gasto",icono:"🏢"},
  {id:"c9",nombre:"Suministros",tipo:"gasto",icono:"💡"},{id:"c10",nombre:"Internet y móvil",tipo:"gasto",icono:"📱"},
  {id:"c11",nombre:"Seguros",tipo:"gasto",icono:"🛡️"},{id:"c12",nombre:"Médico y farmacia",tipo:"gasto",icono:"💊"},
  {id:"c13",nombre:"Deporte y gym",tipo:"gasto",icono:"🏋️"},{id:"c14",nombre:"Ropa y calzado",tipo:"gasto",icono:"👕"},
  {id:"c15",nombre:"Cine y espectáculos",tipo:"gasto",icono:"🎬"},{id:"c16",nombre:"Ocio y hobbies",tipo:"gasto",icono:"🎮"},
  {id:"c17",nombre:"Viajes y vacaciones",tipo:"gasto",icono:"✈️"},{id:"c18",nombre:"Educación",tipo:"gasto",icono:"📚"},
  {id:"c19",nombre:"Libros y prensa",tipo:"gasto",icono:"📰"},{id:"c20",nombre:"Suscripciones",tipo:"gasto",icono:"📺"},
  {id:"c21",nombre:"Mascotas",tipo:"gasto",icono:"🐾"},{id:"c22",nombre:"Regalos",tipo:"gasto",icono:"🎁"},
  {id:"c23",nombre:"Hogar y menaje",tipo:"gasto",icono:"🪴"},{id:"c24",nombre:"Peluquería",tipo:"gasto",icono:"✂️"},
  {id:"c25",nombre:"Impuestos y tasas",tipo:"gasto",icono:"🧾"},{id:"c26",nombre:"Otros gastos",tipo:"gasto",icono:"📦"},
  {id:"c30",nombre:"Nómina",tipo:"ingreso",icono:"💼"},{id:"c31",nombre:"Paga extra",tipo:"ingreso",icono:"💰"},
  {id:"c32",nombre:"Autónomo / Factura",tipo:"ingreso",icono:"🧾"},{id:"c33",nombre:"Intereses bancarios",tipo:"ingreso",icono:"🏦"},
  {id:"c34",nombre:"Dividendos",tipo:"ingreso",icono:"📈"},{id:"c35",nombre:"Alquiler cobrado",tipo:"ingreso",icono:"🏠"},
  {id:"c36",nombre:"Venta de bienes",tipo:"ingreso",icono:"🛍️"},{id:"c37",nombre:"Prestación pública",tipo:"ingreso",icono:"🏛️"},
  {id:"c38",nombre:"Pensión",tipo:"ingreso",icono:"👴"},{id:"c39",nombre:"Otros ingresos",tipo:"ingreso",icono:"➕"},
];

// ── Helpers de estilo ─────────────────────────────────────────────────────────
const IS={width:"100%",boxSizing:"border-box",background:C.sa,border:`1px solid ${C.bd}`,borderRadius:".5rem",color:C.tx,padding:".55rem .75rem",fontSize:".875rem",outline:"none"};
const card=(extra={})=>({background:C.sf,borderRadius:".875rem",padding:"1.1rem 1.25rem",border:`1px solid ${C.bd}`,...extra});
const btn=(bg,fg,sm)=>({border:"none",borderRadius:".5rem",cursor:"pointer",fontWeight:600,fontSize:sm?".775rem":".875rem",padding:sm?".35rem .7rem":".6rem 1.1rem",background:bg,color:fg});

// ── Componentes base ──────────────────────────────────────────────────────────
function Modal({title,onClose,children}){
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(44,42,39,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}},
    h("div",{className:"pmb"},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"1.1rem 1.5rem",borderBottom:`1px solid ${C.bd}`}},
        h("h3",{style:{margin:0,color:C.tx,fontSize:".95rem",fontWeight:600}},title),
        h("button",{onClick:onClose,style:{background:"none",border:"none",color:C.ts,cursor:"pointer",fontSize:"1.1rem",lineHeight:1,padding:".2rem"}},"✕")
      ),
      h("div",{style:{padding:"1.25rem 1.5rem",maxHeight:"80vh",overflowY:"auto"}},children)
    )
  );
}
function Field({label,children}){return h("div",{style:{marginBottom:".875rem"}},label&&h("label",{style:{display:"block",color:C.tm,fontSize:".775rem",marginBottom:".35rem",fontWeight:500}},label),children);}
function Inp({label,...p}){return h(Field,{label},h("input",{...p,style:{...IS,...p.style}}));}
function Sel({label,children,...p}){return h(Field,{label},h("select",{...p,style:{...IS,...p.style}},children));}
function Btn({children,variant="primary",small,...p}){
  const vs={primary:[C.ac,"#fff"],success:[C.gn,"#fff"],danger:[C.rd,"#fff"],blue:[C.bl,"#fff"],ghost:[C.sa,C.tm]};
  const[bg,fg]=vs[variant];
  const s={...btn(bg,fg,small),...(variant==="ghost"?{border:`1px solid ${C.bd}`}:{})};
  return h("button",{...p,style:s},children);
}
function Card({children,style}){return h("div",{style:card(style)},children);}
function Badge({color,bg,children}){return h("span",{style:{display:"inline-flex",alignItems:"center",gap:".25rem",background:bg||color+"18",color,borderRadius:"99px",padding:".2rem .6rem",fontSize:".72rem",fontWeight:600}},children);}

function Donut({slices,size=100}){
  const total=slices.reduce((s,x)=>s+x.value,0)||1;
  let off=0;const r=40,ci=2*Math.PI*r;
  return h("svg",{width:size,height:size,viewBox:"0 0 100 100"},
    ...slices.map((s,i)=>{const p=s.value/total,da=p*ci;const el=h("circle",{key:i,cx:50,cy:50,r,fill:"none",stroke:s.color,strokeWidth:16,strokeDasharray:`${da} ${ci-da}`,strokeDashoffset:-off*ci,style:{transform:"rotate(-90deg)",transformOrigin:"50% 50%"}});off+=p;return el;}),
    h("circle",{cx:50,cy:50,r:31,fill:C.sf})
  );
}

function AutoInput({label,value,onChange,sugs}){
  const[open,setOpen]=useState(false);const[act,setAct]=useState(-1);const ref=useRef(null);
  const fil=useMemo(()=>{if(!value.trim())return[];const q=value.toLowerCase();return[...new Set(sugs.filter(s=>s.toLowerCase().includes(q)&&s.toLowerCase()!==q))].slice(0,7);},[value,sugs]);
  useEffect(()=>{setOpen(fil.length>0);setAct(-1);},[fil.length]);
  useEffect(()=>{const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);
  function onKey(e){if(!open)return;if(e.key==="ArrowDown"){e.preventDefault();setAct(a=>Math.min(a+1,fil.length-1));}else if(e.key==="ArrowUp"){e.preventDefault();setAct(a=>Math.max(a-1,-1));}else if(e.key==="Enter"&&act>=0){e.preventDefault();onChange(fil[act]);setOpen(false);}else if(e.key==="Escape")setOpen(false);}
  return h("div",{ref,style:{marginBottom:".875rem",position:"relative"}},
    label&&h("label",{style:{display:"block",color:C.tm,fontSize:".775rem",marginBottom:".35rem",fontWeight:500}},label),
    h("input",{value,onChange:e=>onChange(e.target.value),onKeyDown:onKey,onFocus:()=>fil.length>0&&setOpen(true),placeholder:"Descripción del movimiento",autoComplete:"off",style:IS}),
    open&&h("ul",{style:{position:"absolute",top:"calc(100% + 3px)",left:0,right:0,zIndex:2000,background:C.sf,border:`1px solid ${C.bd}`,borderRadius:".5rem",margin:0,padding:".25rem 0",listStyle:"none",boxShadow:"0 6px 20px rgba(44,42,39,.12)",maxHeight:210,overflowY:"auto"}},
      fil.map((s,i)=>h("li",{key:s,onMouseDown:()=>{onChange(s);setOpen(false);},style:{padding:".45rem .75rem",cursor:"pointer",fontSize:".85rem",background:i===act?C.sa:"transparent",color:i===act?C.tx:C.tm,display:"flex",alignItems:"center",gap:".4rem"}},h("span",{style:{color:C.ts,fontSize:".75rem"}},"↩"),s))
    )
  );
}

function Spinner({text}){
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:"1rem",color:C.tm}},
    h("div",{style:{width:36,height:36,border:`3px solid ${C.bd}`,borderTopColor:C.ac,borderRadius:"50%",animation:"spin .8s linear infinite"}}),
    h("p",{style:{margin:0,fontSize:".875rem"}},text)
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App({onLogout}){
  const[profs,setProfs]=useState([]);
  const[ctas,setCtas]=useState([]);
  const[cats,setCats]=useState([]);
  const[movs,setMovs]=useState([]);
  const[pa,setPa]=useState(null);
  const[load,setLoad]=useState(true);
  const[err,setErr]=useState(null);
  const[vista,setVista]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[ctaEditar,setCtaEditar]=useState(null);
  const[movEditar,setMovEditar]=useState(null);
  const[fil,setFil]=useState({mes:tod().slice(0,7),cuenta:"",cat:""});

  const reload=useCallback(async()=>{
    try{
      setLoad(true);setErr(null);
      let ps=await sb.get("perfiles");
      if(!ps.length){
        const p1={id:"p1",nombre:"Personal",icono:"👤",color:PAL[0]};
        const p2={id:"p2",nombre:"Común",icono:"👫",color:PAL[1]};
        await sb.upsert("perfiles",[p1,p2]);
        for(const p of[p1,p2]){
          await sb.upsert("cuentas",[{id:uid(),perfil_id:p.id,nombre:"Efectivo",tipo:"efectivo",color:PAL[2],saldo_inicial:0},{id:uid(),perfil_id:p.id,nombre:"Cuenta Corriente",tipo:"corriente",color:PAL[1],saldo_inicial:0}]);
          await sb.upsert("categorias",CATS.map(c=>({...c,id:`${p.id}_${c.id}`,perfil_id:p.id})));
        }
        ps=[p1,p2];
      }
      setProfs(ps);setPa(x=>x||ps[0]?.id);
      const[cs,cts,ms]=await Promise.all([sb.get("cuentas"),sb.get("categorias"),sb.get("movimientos")]);
      setCtas(cs);setCats(cts);setMovs(ms);
    }catch(e){setErr(e.message);}
    finally{setLoad(false);}
  },[]);

  useEffect(()=>{reload();},[]);

  const prof=profs.find(p=>p.id===pa)||profs[0];
  const mCtas=ctas.filter(c=>c.perfil_id===pa);
  const mCats=cats.filter(c=>c.perfil_id===pa);
  const mMovs=movs.filter(m=>m.perfil_id===pa);

  const saldos=useMemo(()=>{
    const m={};mCtas.forEach(c=>m[c.id]=c.saldo_inicial||0);
    mMovs.forEach(v=>{
      if(v.tipo==="ingreso")m[v.cuenta_id]=(m[v.cuenta_id]||0)+v.importe;
      else if(v.tipo==="gasto")m[v.cuenta_id]=(m[v.cuenta_id]||0)-v.importe;
      else if(v.tipo==="transferencia"){m[v.cuenta_id]=(m[v.cuenta_id]||0)-v.importe;m[v.cuenta_dest_id]=(m[v.cuenta_dest_id]||0)+v.importe;}
    });return m;
  },[mCtas,mMovs]);

  const sTotal=Object.values(saldos).reduce((a,b)=>a+b,0);

  const mFil=useMemo(()=>mMovs.filter(m=>{
    const eM=!fil.mes||m.fecha.startsWith(fil.mes);
    const eC=!fil.cuenta||m.cuenta_id===fil.cuenta;
    const eCa=!fil.cat||m.categoria_id===fil.cat;
    return eM&&eC&&eCa;
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha)),[mMovs,fil]);

  const ingM=mFil.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+m.importe,0);
  const gasM=mFil.filter(m=>m.tipo==="gasto").reduce((s,m)=>s+m.importe,0);

  const gasCat=useMemo(()=>{
    const mp={};mFil.filter(m=>m.tipo==="gasto").forEach(m=>{mp[m.categoria_id]=(mp[m.categoria_id]||0)+m.importe;});
    return Object.entries(mp).map(([id,v])=>{const c=mCats.find(x=>x.id===id);return{id,nombre:c?.nombre||"?",icono:c?.icono||"",value:v,color:PAL[Object.keys(mp).indexOf(id)%PAL.length]};}).sort((a,b)=>b.value-a.value);
  },[mFil,mCats]);

  const evo=useMemo(()=>{
    const ms=[];
    for(let i=5;i>=0;i--){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);const k=d.toISOString().slice(0,7);const lb=d.toLocaleDateString("es-ES",{month:"short"});const mv=mMovs.filter(m=>m.fecha.startsWith(k));ms.push({lb,ing:mv.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+m.importe,0),gas:mv.filter(m=>m.tipo==="gasto").reduce((s,m)=>s+m.importe,0)});}
    return ms;
  },[mMovs]);

  async function addMov(f){const m={id:uid(),perfil_id:pa,tipo:f.tipo,fecha:f.fecha,importe:parseFloat(f.importe),concepto:f.concepto||null,cuenta_id:f.cuentaId,categoria_id:f.catId||null,cuenta_dest_id:f.cuentaDestId||null};await sb.upsert("movimientos",m);setMovs(ms=>[...ms,m]);setModal(null);}
  async function delMov(id){if(!confirm("¿Eliminar?"))return;await sb.del("movimientos",id);setMovs(ms=>ms.filter(m=>m.id!==id));}
  async function editMov(id,form){
    const mov={id,perfil_id:pa,tipo:form.tipo,fecha:form.fecha,importe:parseFloat(form.importe),concepto:form.concepto||null,cuenta_id:form.cuentaId,categoria_id:form.catId||null,cuenta_dest_id:form.tipo==="transferencia"?(form.cuentaDestId||null):null};
    await sb.upsert("movimientos",mov);
    setMovs(ms=>ms.map(m=>m.id===id?mov:m));
    setMovEditar(null);setModal(null);
  }
  async function addCta(f){const c={id:uid(),perfil_id:pa,nombre:f.nombre,tipo:f.tipo,color:f.color,saldo_inicial:parseFloat(f.si||0)};await sb.upsert("cuentas",c);setCtas(cs=>[...cs,c]);setModal(null);}
  async function editCta(id,f){const c={id,perfil_id:pa,nombre:f.nombre,tipo:f.tipo,color:f.color,saldo_inicial:parseFloat(f.si||0)};await sb.upsert("cuentas",c);setCtas(cs=>cs.map(x=>x.id===id?c:x));setCtaEditar(null);setModal(null);}
  async function delCta(id){if(mMovs.some(m=>m.cuenta_id===id||m.cuenta_dest_id===id)){alert("Tiene movimientos.");return;}if(!confirm("¿Eliminar cuenta?"))return;await sb.del("cuentas",id);setCtas(cs=>cs.filter(c=>c.id!==id));}
  async function addCat(f){const c={id:uid(),perfil_id:pa,nombre:f.nombre,tipo:f.tipo,icono:f.icono};await sb.upsert("categorias",c);setCats(cs=>[...cs,c]);setModal(null);}

// ── Vista Importar ────────────────────────────────────────────────────────────
function VistaImportar({mCtas, mCats, mMovs, saldos, perfilActivo, onImport}) {
  const [filas, setFilas] = useState(null);
  const [analizando, setAnalizando] = useState(false);
  const [importando, setImportando] = useState(false);
  const [error, setError] = useState(null);
  const [cuentaSelId, setCuentaSelId] = useState(mCtas[0]?.id||"");
  const [banco, setBanco] = useState("bbva");

  async function cargarArchivo(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!cuentaSelId) { alert("Selecciona primero la cuenta."); return; }
    e.target.value = "";
    setError(null); setFilas(null); setAnalizando(true);
    try {
      if (banco === "bbva") await parseBBVA(file);
      else await parseRevolut(file);
    } catch(ex) { setError(ex.message); }
    finally { setAnalizando(false); }
  }

  // ── Parser BBVA (xlsx) ──────────────────────────────────────────────────────
  async function parseBBVA(file) {
    if (!window.XLSX) {
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const all = window.XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});

    let hIdx = all.findIndex(r=>Array.isArray(r)&&r.some(c=>String(c||"").trim().toLowerCase()==="importe"));
    if(hIdx<0) throw new Error("No se encontró la cabecera. ¿Es el Excel de 'Últimos movimientos' del BBVA?");
    const hdr = all[hIdx].map(c=>String(c||"").trim().toLowerCase());

    const iF=hdr.findIndex(h=>h==="fecha"), iC=hdr.findIndex(h=>h==="concepto");
    const iMov=hdr.findIndex(h=>h==="movimiento"), iImp=hdr.findIndex(h=>h==="importe");
    const iObs=hdr.findIndex(h=>h==="observaciones");

    const dataRows=all.slice(hIdx+1).filter(r=>Array.isArray(r)&&r[iImp]!==null&&r[iImp]!==undefined&&r[iImp]!==""&&!isNaN(Number(r[iImp])));
    if(!dataRows.length) throw new Error("No se encontraron movimientos.");

    const existentes=new Set(mMovs.map(m=>m.fecha+"_"+m.importe));
    const parsed=dataRows.map((r,i)=>{
      const rawFecha=String(r[iF]||"");
      const concepto=String(r[iC]||"").trim();
      const mov=String(r[iMov]||"").trim();
      const obs=String(r[iObs]||"").trim();
      const importe=Number(r[iImp]);
      let fecha="";
      const mf=rawFecha.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(mf) fecha=mf[3]+"-"+mf[2].padStart(2,"0")+"-"+mf[1].padStart(2,"0");
      else if(!isNaN(Number(rawFecha))&&Number(rawFecha)>1000){const d=new Date(Math.round((Number(rawFecha)-25569)*86400*1000));fecha=d.toISOString().slice(0,10);}
      if(!fecha) return null;
      const texto=(concepto+" "+mov+" "+obs).toLowerCase();
      const esTransf=texto.includes("aporte")||texto.includes("traspaso")||(concepto.toLowerCase().includes("transferencia")&&(texto.includes("javier silva")||obs.toLowerCase().includes("aporte")));
      let tipo=importe>=0?"ingreso":"gasto";
      if(esTransf) tipo="transferencia";
      const isDup=existentes.has(fecha+"_"+Math.abs(importe));
      return {_id:"r"+i,fecha,concepto:obs||mov||concepto,textoParaCat:texto,importe:Math.abs(importe),tipo,cuentaId:cuentaSelId,cuentaDestId:"",catId:"",skip:isDup,dup:isDup,sugerencia:null};
    }).filter(Boolean);

    await clasificarConIA(parsed);
  }

  // ── Parser Revolut (csv) ────────────────────────────────────────────────────
  async function parseRevolut(file) {
    const text = await file.text();
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase());

    const iTipo = headers.findIndex(h=>h==="tipo");
    const iDesc = headers.findIndex(h=>h.includes("descripci"));
    const iImp  = headers.findIndex(h=>h==="importe");
    const iFecha= headers.findIndex(h=>h.includes("fecha de inicio"));
    const iState= headers.findIndex(h=>h==="state");

    const existentes=new Set(mMovs.map(m=>m.fecha+"_"+m.importe));

    const parsed = lines.slice(1).map((line,i)=>{
      // Parsear CSV respetando comillas
      const cols = [];
      let cur="", inQ=false;
      for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}
      cols.push(cur.trim());

      const state = (cols[iState]||"").trim().toUpperCase();
      if(state!=="COMPLETADO") return null;

      const rawTipo = (cols[iTipo]||"").trim();
      const desc    = (cols[iDesc]||"").trim();
      const rawImp  = parseFloat((cols[iImp]||"0").replace(",","."));
      const rawFecha= (cols[iFecha]||"").trim();

      // Fecha: "2026-05-31 15:46:46" → "2026-05-31"
      const fecha = rawFecha.slice(0,10);
      if(!fecha||fecha.length<10) return null;

      const texto=(rawTipo+" "+desc).toLowerCase();

      // Detectar tipo
      let tipo;
      if(rawTipo==="Pago con tarjeta") tipo="gasto";
      else if(rawTipo==="Recargas"||rawTipo==="Intereses") tipo="ingreso";
      else if(rawTipo==="Transferir"){
        // "Desde EUR Cuenta Remunerada" = transferencia interna
        if(texto.includes("desde eur")||texto.includes("cuenta remunerada")||texto.includes("to javier")||texto.includes("javier silva")) tipo="transferencia";
        else tipo = rawImp>=0?"ingreso":"gasto";
      } else tipo = rawImp>=0?"ingreso":"gasto";

      const importe=Math.abs(rawImp);
      const isDup=existentes.has(fecha+"_"+importe);

      return {_id:"v"+i,fecha,concepto:desc,textoParaCat:texto,importe,tipo,cuentaId:cuentaSelId,cuentaDestId:"",catId:"",skip:isDup,dup:isDup,sugerencia:null};
    }).filter(Boolean);

    await clasificarConIA(parsed.sort((a,b)=>b.fecha.localeCompare(a.fecha)));
  }

  // ── Clasificación IA ────────────────────────────────────────────────────────
  async function clasificarConIA(parsed) {
    setFilas(parsed);
    const paraClas=parsed.filter(r=>!r.skip&&r.tipo!=="transferencia");
    if(!paraClas.length) return;
    const gastosCat=mCats.filter(c=>c.tipo==="gasto").map(c=>c.nombre).join(", ");
    const ingresosCat=mCats.filter(c=>c.tipo==="ingreso").map(c=>c.nombre).join(", ");
    const lineas=paraClas.map(r=>r._id+": "+r.textoParaCat).join("\n");
    try{
      const resp=await fetch("https://perricas.silva-and-co.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,
          system:"Clasificador de movimientos bancarios espanoles. Devuelve el nombre EXACTO de la categoria de la lista o 'Sin categoria'. Responde SOLO JSON: {\"id\":\"categoria\"}",
          messages:[{role:"user",content:"Categorias gasto: "+gastosCat+"\nCategorias ingreso: "+ingresosCat+"\n\nClasifica:\n"+lineas}]})});
      if(resp.ok){
        const data=await resp.json();
        const text=data.content[0].text.replace(/```json|```/g,"").trim();
        const sugs=JSON.parse(text);
        setFilas(prev=>prev.map(r=>{const sug=sugs[r._id];const cat=mCats.find(c=>c.nombre===sug);return{...r,catId:cat?.id||"",sugerencia:cat?.nombre||null};}));
      }
    }catch(_){}
  }

  function updateFila(id,key,val){setFilas(prev=>prev.map(r=>r._id===id?{...r,[key]:val}:r));}

  async function confirmarImport(){
    const toImport=filas.filter(r=>!r.skip);
    if(!toImport.length){alert("No hay movimientos para importar.");return;}
    setImportando(true);
    try{
      const movs=toImport.map(r=>({
        id:"imp_"+r._id+"_"+Date.now()+"_"+Math.random().toString(36).slice(2),
        perfil_id:perfilActivo,tipo:r.tipo,fecha:r.fecha,
        importe:parseFloat(r.importe),concepto:r.concepto||null,
        cuenta_id:r.cuentaId,categoria_id:r.catId||null,
        cuenta_dest_id:r.tipo==="transferencia"?(r.cuentaDestId||null):null,
      }));
      await onImport(movs);
    }catch(ex){alert("Error: "+ex.message);setImportando(false);}
  }

  const pendientes=filas?filas.filter(r=>!r.skip).length:0;
  const duplicados=filas?filas.filter(r=>r.dup).length:0;
  const aceptar=banco==="bbva"?".xlsx,.xls":".csv";

  return h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}},
      h("h2",{style:{margin:0,fontSize:"1rem",fontWeight:600}},"⬆ Importar movimientos"),
      filas&&pendientes>0&&h(Btn,{onClick:confirmarImport,disabled:importando},importando?"Importando...":"Importar "+pendientes+" movimientos")
    ),

    !filas&&h(Card,{style:{padding:"2rem"}},
      h("div",{style:{fontSize:"2rem",textAlign:"center",marginBottom:"1rem"}},"📄"),

      // Selector banco
      h(Field,{label:"1. ¿De qué banco es el fichero?"},
        h("div",{style:{display:"flex",gap:".5rem"}},
          ...[["bbva","🏦 BBVA (.xlsx)"],["revolut","💳 Revolut (.csv)"]].map(([v,l])=>
            h("button",{key:v,onClick:()=>setBanco(v),style:{flex:1,padding:".5rem",borderRadius:".5rem",cursor:"pointer",fontWeight:600,fontSize:".82rem",
              background:banco===v?C.accentBg:C.sa,color:banco===v?C.ac:C.tm,border:"1px solid "+(banco===v?C.ac:C.bd)}},l)
          )
        )
      ),

      // Selector cuenta
      h(Field,{label:"2. ¿A qué cuenta pertenece este extracto?"},
        h("select",{value:cuentaSelId,onChange:e=>setCuentaSelId(e.target.value),style:IS},
          h("option",{value:""},"— Selecciona una cuenta —"),
          ...mCtas.map(c=>h("option",{key:c.id,value:c.id},c.nombre," (",c.tipo,")"))
        )
      ),

      // Botón archivo
      h("div",null,
        h("label",{style:{display:"block",color:C.tm,fontSize:".775rem",marginBottom:".35rem",fontWeight:500}},"3. Selecciona el archivo"),
        analizando
          ?h("div",{style:{display:"flex",alignItems:"center",gap:".75rem",color:C.tm,padding:".5rem 0"}},
              h("div",{style:{width:24,height:24,border:"3px solid "+C.bd,borderTopColor:C.ac,borderRadius:"50%",animation:"spin .8s linear infinite"}}),
              h("span",{style:{fontSize:".875rem"}},"Analizando y clasificando con IA..."))
          :h("label",{style:{display:"inline-block",background:cuentaSelId?C.ac:C.sa,color:cuentaSelId?"#fff":C.ts,borderRadius:".5rem",padding:".6rem 1.25rem",cursor:cuentaSelId?"pointer":"default",fontWeight:600,fontSize:".875rem"}},
              "Seleccionar "+(banco==="bbva"?"archivo .xlsx":"archivo .csv"),
              h("input",{type:"file",accept:aceptar,onChange:cargarArchivo,disabled:!cuentaSelId,style:{display:"none"}}))
      )
    ),

    error&&h(Card,{style:{background:C.rb,border:"1px solid "+C.rd+"44",marginBottom:"1rem"}},h("p",{style:{margin:0,color:C.rd,fontSize:".875rem"}},error)),

    filas&&!analizando&&h("div",null,
      h(Card,{style:{marginBottom:"1rem",padding:".75rem 1rem"}},
        h("div",{style:{display:"flex",gap:"1rem",flexWrap:"wrap",alignItems:"center"}},
          h("span",{style:{color:C.gn,fontWeight:600,fontSize:".82rem"}},"✓ "+pendientes+" nuevos a importar"),
          duplicados>0&&h("span",{style:{color:C.ts,fontSize:".82rem"}},duplicados+" duplicados omitidos"),
          h("div",{style:{display:"flex",gap:".5rem",marginLeft:"auto"}},
            h("button",{onClick:()=>setFilas(prev=>prev.map(r=>({...r,skip:false}))),style:{background:"none",border:"1px solid "+C.bd,borderRadius:".4rem",color:C.tm,cursor:"pointer",fontSize:".78rem",padding:".25rem .6rem"}},"✓ Todos"),
            h("button",{onClick:()=>setFilas(prev=>prev.map(r=>({...r,skip:true}))),style:{background:"none",border:"1px solid "+C.bd,borderRadius:".4rem",color:C.tm,cursor:"pointer",fontSize:".78rem",padding:".25rem .6rem"}},"✗ Ninguno"),
            h("button",{onClick:()=>setFilas(null),style:{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:".8rem"}},"← Cargar otro")
          )
        )
      ),

      // Saldos proyectados por cuenta
      h(Card,{style:{marginBottom:"1rem",padding:".75rem 1rem",background:C.accentBg,border:"1px solid "+C.ac+"33"}},
        h("p",{style:{margin:"0 0 .6rem",fontWeight:600,fontSize:".8rem",color:C.ac}},"💳 Saldo proyectado tras importar"),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:".75rem"}},
          ...mCtas.map(cta=>{
            // Saldo actual del dashboard (ya calculado correctamente con saldo_inicial + movimientos)
            const saldoActual = saldos[cta.id]||0;
            // Impacto de los movimientos seleccionados sobre esta cuenta
            const impacto = (filas||[]).filter(r=>!r.skip).reduce((s,r)=>{
              if(r.cuentaId===cta.id){
                if(r.tipo==="ingreso") return s+r.importe;
                if(r.tipo==="gasto")   return s-r.importe;
                if(r.tipo==="transferencia") return s-r.importe;
              }
              if(r.cuentaDestId===cta.id&&r.tipo==="transferencia") return s+r.importe;
              return s;
            },0);
            const saldoFinal = saldoActual + impacto;
            const cambio = Math.abs(impacto)>0.001;
            // Último movimiento registrado en esta cuenta
            const movsDeEsta = mMovs.filter(m=>m.cuenta_id===cta.id||m.cuenta_dest_id===cta.id);
            const ultimaFecha = movsDeEsta.length>0 ? movsDeEsta.map(m=>m.fecha).sort().reverse()[0] : null;
            return h("div",{key:cta.id,style:{display:"flex",alignItems:"center",gap:".5rem",background:C.sf,borderRadius:".5rem",padding:".45rem .75rem",border:"1px solid "+C.bd}},

              h("div",null,
                h("p",{style:{margin:0,color:C.tm,fontSize:".7rem",fontWeight:500}},cta.nombre),
                h("p",{style:{margin:"0.1rem 0 0",fontWeight:700,fontSize:".88rem",fontFamily:"'Inter',system-ui,sans-serif",color:saldoFinal>=0?C.gn:C.rd}},
                  fmt(saldoFinal),
                  cambio&&h("span",{style:{fontSize:".7rem",fontWeight:500,color:impacto>=0?C.gn:C.rd,marginLeft:".35rem"}},
                    (impacto>=0?"+":"")+fmt(impacto)
                  )
                ),
                h("p",{style:{margin:"0.1rem 0 0",color:C.ts,fontSize:".68rem"}},
                  ultimaFecha ? "Último mov.: "+fmtD(ultimaFecha) : "Sin movimientos"
                )
              )
            );
          })
        )
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:".35rem"}},
        filas.map(r=>h(Card,{key:r._id,style:{padding:".6rem .9rem",opacity:r.skip?.7:1,background:r.dup?C.sa:C.sf}},
          h("div",{style:{display:"flex",alignItems:"center",gap:".5rem",flexWrap:"wrap"}},
            h("input",{type:"checkbox",checked:!r.skip,onChange:e=>updateFila(r._id,"skip",!e.target.checked),style:{flexShrink:0,width:16,height:16,cursor:"pointer"}}),
            h("span",{style:{color:C.ts,fontSize:".72rem",flexShrink:0,minWidth:68}},r.fecha),
            h("div",{style:{flex:1,minWidth:100}},
              h("input",{value:r.concepto,onChange:e=>updateFila(r._id,"concepto",e.target.value),disabled:r.skip,
                style:{...IS,padding:".28rem .5rem",fontSize:".79rem",background:r.skip?"transparent":C.sa,border:r.skip?"none":"1px solid "+C.bd}})
            ),
            h("select",{value:r.tipo,onChange:e=>updateFila(r._id,"tipo",e.target.value),disabled:r.skip,
              style:{...IS,width:"auto",padding:".28rem .45rem",fontSize:".77rem",color:r.tipo==="ingreso"?C.gn:r.tipo==="transferencia"?C.bl:C.rd}},
              h("option",{value:"gasto"},"↓ Gasto"),h("option",{value:"ingreso"},"↑ Ingreso"),h("option",{value:"transferencia"},"↔ Transf.")
            ),
            r.tipo!=="transferencia"&&h("select",{value:r.catId,onChange:e=>updateFila(r._id,"catId",e.target.value),disabled:r.skip,
              style:{...IS,width:"auto",padding:".28rem .45rem",fontSize:".77rem"}},
              h("option",{value:""},"Sin cat."),
              ...mCats.filter(c=>c.tipo===r.tipo).map(c=>h("option",{key:c.id,value:c.id},c.icono+" "+c.nombre))
            ),
            r.tipo==="transferencia"

                  ),
                  h("span",{style:{color:C.ts,fontSize:".75rem",flexShrink:0}},"→"),
                  h("select",{value:r.cuentaDestId,onChange:e=>updateFila(r._id,"cuentaDestId",e.target.value),disabled:r.skip,

                    ...mCtas.filter(c=>c.id!==r.cuentaId).map(c=>h("option",{key:c.id,value:c.id},"↓ "+c.nombre))
                  )
                )
              :h("select",{value:r.cuentaId,onChange:e=>updateFila(r._id,"cuentaId",e.target.value),disabled:r.skip,
                  style:{...IS,width:"auto",padding:".28rem .45rem",fontSize:".77rem"}},
                  ...mCtas.map(c=>h("option",{key:c.id,value:c.id},c.nombre))
                ),
            h("span",{style:{fontWeight:700,fontSize:".88rem",fontFamily:"'Inter',system-ui,sans-serif",

        ))
      )
    )
  );
}

// ── Vista Informe ─────────────────────────────────────────────────────────────
function VistaInforme({mMovs, mCats, mCtas, prof}) {
  const hoy = new Date();
  const mesInicio = new Date(hoy.getFullYear(), hoy.getMonth() - 2, 1).toISOString().slice(0,7);
  const [desde, setDesde] = useState(mesInicio);
  const [hasta, setHasta] = useState(hoy.toISOString().slice(0,7));
  const [informe, setInforme] = useState(null);
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState(null);

  async function generarInforme() {
    setCargando(true); setError(null); setInforme(null);
    try {
      const movsFiltrados = mMovs.filter(function(m) {
        var mes = m.fecha.slice(0,7);
        return mes >= desde && mes <= hasta;
      });

      if (movsFiltrados.length === 0) {
        setError("No hay movimientos en el periodo seleccionado.");
        setCargando(false);
        return;
      }

      var ingresos = movsFiltrados.filter(function(m){return m.tipo==="ingreso";}).reduce(function(s,m){return s+m.importe;},0);
      var gastos   = movsFiltrados.filter(function(m){return m.tipo==="gasto";  }).reduce(function(s,m){return s+m.importe;},0);

      var porCat = {};
      movsFiltrados.filter(function(m){return m.tipo==="gasto";}).forEach(function(m){
        var cat = mCats.find(function(c){return c.id===m.categoria_id;});
        var nombre = cat ? (cat.icono + " " + cat.nombre) : "Sin categoría";
        porCat[nombre] = (porCat[nombre]||0) + m.importe;
      });
      var catsSorted = Object.entries(porCat).sort(function(a,b){return b[1]-a[1];});

      var meses = {};
      movsFiltrados.forEach(function(m){
        var mes = m.fecha.slice(0,7);
        if (!meses[mes]) meses[mes] = {ingresos:0, gastos:0};
        if (m.tipo==="ingreso") meses[mes].ingresos += m.importe;
        if (m.tipo==="gasto")   meses[mes].gastos   += m.importe;
      });

      var lineas = [
        "Perfil: " + (prof ? prof.icono + " " + prof.nombre : ""),
        "Periodo: " + desde + " a " + hasta,
        "Total ingresos: " + ingresos.toFixed(2) + "EUR",
        "Total gastos: " + gastos.toFixed(2) + "EUR",
        "Balance: " + (ingresos-gastos).toFixed(2) + "EUR",
        "Tasa de ahorro: " + (ingresos>0 ? ((1-gastos/ingresos)*100).toFixed(1) : 0) + "%",
        "",
        "Gastos por categoria:"
      ];
      catsSorted.forEach(function(e){ lineas.push("  " + e[0] + ": " + e[1].toFixed(2) + "EUR"); });
      lineas.push("");
      lineas.push("Evolucion mensual:");
      Object.entries(meses).sort().forEach(function(e){
        lineas.push("  " + e[0] + ": ingresos " + e[1].ingresos.toFixed(2) + "EUR / gastos " + e[1].gastos.toFixed(2) + "EUR");
      });

      var resumen = lineas.join("\n");

      var resp = await fetch("https://perricas.silva-and-co.workers.dev", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: "Eres un asesor financiero personal experto. Analiza los datos de contabilidad domestica y genera un informe detallado en espanol con: 1) Resumen ejecutivo, 2) Analisis de ingresos y gastos, 3) Categorias donde mas se gasta, 4) Tendencias mensuales, 5) Recomendaciones concretas y accionables. Usa un tono cercano pero profesional. Formatea con secciones claras usando emojis.",
          messages: [{role:"user", content:"Analiza estos datos financieros y genera un informe de salud financiera detallado:\n\n" + resumen}]
        })
      });

      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error ? data.error.message : "Error en la API: "+JSON.stringify(data));
      if (!data.content || !data.content[0]) throw new Error("Respuesta inesperada: "+JSON.stringify(data));
      setInforme(data.content[0].text);
    } catch(e) {
      setError("Error generando el informe: " + e.message);
    } finally {
      setCargando(false);
    }
  }

  return h("div", null,
    h("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}},
      h("h2", {style:{margin:0,fontSize:"1rem",fontWeight:600}}, "✦ Informe financiero")
    ),
    h(Card, {style:{marginBottom:"1rem"}},
      h("p", {style:{margin:"0 0 .75rem",fontWeight:600,fontSize:".82rem",color:C.tx}}, "Selecciona el periodo"),
      h("div", {style:{display:"flex",gap:"1rem",flexWrap:"wrap",alignItems:"flex-end"}},
        h("div", null,
          h("label", {style:{display:"block",color:C.tm,fontSize:".72rem",marginBottom:".3rem",fontWeight:500}}, "Desde"),
          h("input", {type:"month", value:desde, onChange:function(e){setDesde(e.target.value);}, style:IS})
        ),
        h("div", null,
          h("label", {style:{display:"block",color:C.tm,fontSize:".72rem",marginBottom:".3rem",fontWeight:500}}, "Hasta"),

// ── Auth Google via Supabase SDK ──────────────────────────────────────────────
const AUTH_KEY = "perricas_auth";
const EMAILS_AUTORIZADOS = ["beatrizbeasac@gmail.com", "silva.and.co@gmail.com"];

const sbAuth = {
  async getSession() {
    const {data:{user}} = await sbc.auth.getUser();
    return user;
  },
  async signInWithGoogle() {
    await sbc.auth.signInWithOAuth({
      provider: "google",
      options: {redirectTo: window.location.href.split("?")[0].split("#")[0]}
    });
  },
  async signOut() {
    await sbc.auth.signOut();
    localStorage.removeItem(AUTH_KEY);
  }
};

function extractTokenFromUrl() {
  return localStorage.getItem(AUTH_KEY);
}

function LoginScreen({onAuth}) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  useEffect(()=>{
    // Si venimos del redirect de Google, extraer el token
    const token = extractTokenFromUrl();
    if (token) { onAuth(); return; }
    // Si ya hay sesión guardada, verificarla
    const saved = localStorage.getItem(AUTH_KEY);
    if (saved) {
      setLoading(true);
      sbAuth.getSession().then(u=>{
        if (u && u.id) onAuth();
        else { localStorage.removeItem(AUTH_KEY); setLoading(false); }
      }).catch(()=>setLoading(false));
    }
  },[]);

  async function loginGoogle() {
    setLoading(true); setErr(null);
    try { await sbAuth.signInWithGoogle(); }
    catch(e) { setErr("Error al conectar con Google: "+e.message); setLoading(false); }
  }

  return h("div",{style:{minHeight:"100vh",background:"#f4f3f0",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}},
    h("div",{style:{background:"#faf9f7",borderRadius:"1rem",padding:"2.5rem 2rem",width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(44,42,39,.12)",border:"1px solid #e0ddd8",textAlign:"center"}},
      h("div",{style:{fontSize:"2.5rem",marginBottom:".5rem"}},"◈"),
      h("h1",{style:{margin:"0 0 .4rem",fontFamily:"'Inter',system-ui,sans-serif",fontSize:"1.6rem",color:"#2c2a27",fontWeight:700,letterSpacing:"-.02em"}},"Perricas"),
      h("p",{style:{margin:"0 0 2rem",color:"#a09c97",fontSize:".85rem"}},"Contabilidad del hogar"),
      loading
        ?h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:".75rem",color:"#6b6760",padding:"1rem"}},
            h("div",{style:{width:22,height:22,border:"2px solid #e0ddd8",borderTopColor:"#7c6f5e",borderRadius:"50%",animation:"spin .8s linear infinite"}}),
            h("span",{style:{fontSize:".875rem"}},"Conectando...")
          )
        :h("button",{onClick:loginGoogle,style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:".75rem",background:"#fff",border:"1px solid #e0ddd8",borderRadius:".6rem",padding:".8rem 1rem",cursor:"pointer",fontSize:".9rem",fontWeight:600,color:"#2c2a27",boxShadow:"0 1px 4px rgba(0,0,0,.08)"}},
            // Logo Google SVG
            h("svg",{width:20,height:20,viewBox:"0 0 24 24"},
              h("path",{fill:"#4285F4",d:"M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"}),
              h("path",{fill:"#34A853",d:"M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"}),
              h("path",{fill:"#FBBC05",d:"M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"}),
              h("path",{fill:"#EA4335",d:"M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"})
            ),
            "Entrar con Google"
          ),
      err&&h("p",{style:{margin:"1rem 0 0",color:"#b85c4a",fontSize:".8rem"}},err)
    )
  );
}

function Root() {
  const [auth, setAuth] = useState(false);
  const [checking, setChecking] = useState(true);
  const [noAutorizado, setNoAutorizado] = useState(false);

  useEffect(()=>{
    // Escuchar cambios de sesión del SDK (gestiona tokens y refresh automáticamente)
    const {data:{subscription}} = sbc.auth.onAuthStateChange(async (event, session) => {
      if (session && session.user) {
        const email = session.user.email;
        if (EMAILS_AUTORIZADOS.length > 0 && !EMAILS_AUTORIZADOS.includes(email)) {
          await sbc.auth.signOut();
          setNoAutorizado(true);
          setAuth(false);
        } else {
          setAuth(true);
          setNoAutorizado(false);
        }
      } else {
        setAuth(false);
      }
      setChecking(false);
    });
    return () => subscription.unsubscribe();
  },[]);

  async function logout() {
    await sbAuth.signOut();
    setAuth(false);
    setNoAutorizado(false);
  }

  if (checking) return h(Spinner,{text:"Cargando..."});

  if (noAutorizado) return h("div",{style:{minHeight:"100vh",background:"#f4f3f0",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}},
    h("div",{style:{background:"#faf9f7",borderRadius:"1rem",padding:"2.5rem 2rem",width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(44,42,39,.12)",border:"1px solid #e0ddd8",textAlign:"center"}},
      h("div",{style:{fontSize:"2rem",marginBottom:"1rem"}},"🔒"),
      h("h2",{style:{margin:"0 0 .5rem",color:"#2c2a27",fontSize:"1.1rem",fontWeight:600}},"Acceso no autorizado"),
      h("p",{style:{color:"#6b6760",fontSize:".85rem",margin:"0 0 1.5rem",lineHeight:1.6}},"Esta aplicación es privada. Solo pueden acceder las cuentas autorizadas."),
      h("button",{onClick:logout,style:{background:"#7c6f5e",color:"#fff",border:"none",borderRadius:".5rem",padding:".6rem 1.25rem",cursor:"pointer",fontWeight:600,fontSize:".875rem"}},"Volver al inicio")
    )
  );

  if (!auth) return h(LoginScreen,{onAuth:()=>{}});
  return h(App,{onLogout:logout});
}

ReactDOM.createRoot(document.getElementById("root")).render(h(Root,null));
</script>
